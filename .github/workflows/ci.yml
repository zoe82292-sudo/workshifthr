name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        run: pytest backend/tests -q

      - name: Verify demo snapshot matches analyzer
        run: |
          python scripts/sync_demo_snapshot.py
          git diff --exit-code frontend/src/data/demo-analysis.snapshot.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Start production server
        working-directory: backend
        env:
          JWT_SECRET: ci-test-jwt-secret-with-enough-length-32chars
          AUTH_USERS: '[{"email":"ci@shiftworkshr.com","password":"CiTestPass123!","organization":"CI Org"}]'
          TRIAL_ENABLED: "true"
        run: |
          export PYTHONPATH=$PWD
          uvicorn app.main:app --host 127.0.0.1 --port 8080 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/api/health && break
            sleep 2
          done

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
        run: npx playwright test
