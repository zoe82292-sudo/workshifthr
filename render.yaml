services:
  - type: web
    name: shiftworkshr
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://shiftworkshr.com,https://www.shiftworkshr.com
      - key: JWT_SECRET
        sync: false
      - key: AUTH_USERS
        sync: false
